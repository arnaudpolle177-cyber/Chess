name: Build Coach d'échecs (Windows .exe)

# Se déclenche :
# - automatiquement quand tu pousses un tag de version (ex: v1.0)
# - à la main depuis l'onglet "Actions" de GitHub (bouton "Run workflow")
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # nécessaire pour publier une Release avec le zip

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compiler CoachEchecs.exe
        run: pyinstaller coach.spec

      - name: Vérifier que le moteur (stockfish.exe) est bien présent dans le dépôt
        shell: bash
        run: |
          set -e
          # Ne télécharge PLUS Stockfish automatiquement -- le coach
          # utilise maintenant Berserk (ou un autre moteur au choix), pas
          # forcément Stockfish. Le binaire doit être committé À LA RACINE
          # DU DÉPÔT sous le nom "stockfish.exe" (même si c'est en réalité
          # Berserk renommé -- voir app_paths.py / resolve_stockfish_path,
          # qui cherchent ce nom par défaut). Sans ça, le build s'arrête ici
          # avec un message clair plutôt que d'empaqueter un .exe manquant
          # ou -- pire -- de re-télécharger silencieusement le vrai
          # Stockfish comme avant.
          if [ ! -f stockfish.exe ]; then
            echo "❌ Aucun stockfish.exe trouvé à la racine du dépôt."
            echo "   Ajoute ton moteur (ex: Berserk renommé en stockfish.exe) à la racine du dépôt et relance le build."
            exit 1
          fi
          echo "✅ Moteur trouvé : stockfish.exe ($(du -h stockfish.exe | cut -f1))"
          cp stockfish.exe dist/stockfish.exe

      - name: Préparer le package final
        shell: bash
        run: |
          set -e
          mkdir -p package/CoachEchecs
          cp dist/CoachEchecs.exe package/CoachEchecs/
          cp dist/stockfish.exe package/CoachEchecs/
          cp README_UTILISATEUR.md package/CoachEchecs/LISEZ-MOI.md
          # Livre d'ouvertures : optionnel. S'il est présent à la racine du
          # dépôt (voir opening_book.py), on l'embarque à côté de l'exe --
          # sinon le coach fonctionne quand même, juste sans lui.
          if [ -f opening_book.bin ]; then
            cp opening_book.bin package/CoachEchecs/
            echo "Livre d'ouvertures inclus dans le package."
          else
            echo "Pas de opening_book.bin trouvé à la racine du dépôt -- package sans livre d'ouvertures."
          fi
          cd package
          7z a -r CoachEchecs-windows.zip CoachEchecs

      - name: Publier la Release avec le zip
        uses: softprops/action-gh-release@v2
        with:
          files: package/CoachEchecs-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Garder aussi le zip comme artifact (pour les builds manuels sans tag)
        uses: actions/upload-artifact@v4
        with:
          name: CoachEchecs-windows
          path: package/CoachEchecs-windows.zip
