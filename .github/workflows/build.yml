name: Build Coach d'échecs (Windows .exe)

# Se déclenche :
# - automatiquement quand tu pousses un tag de version (ex: v1.0)
# - à la main depuis l'onglet "Actions" de GitHub (bouton "Run workflow")
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # nécessaire pour publier une Release avec le zip

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compiler CoachEchecs.exe
        run: pyinstaller coach.spec

      - name: Télécharger Berserk (dernière version Windows)
        shell: bash
        run: |
          set -e
          # Berserk plutôt que Stockfish : téléchargé automatiquement à
          # chaque build (comme on le faisait avant pour Stockfish), pour
          # éviter d'avoir à committer un gros .exe dans le dépôt (GitHub
          # bloque l'upload web au-delà de 25 Mo).
          api_url="https://api.github.com/repos/jhonnold/berserk/releases/latest"
          api_response=$(curl -s "$api_url")

          echo "--- Fichiers .exe trouvés dans la dernière release Berserk ---"
          echo "$api_response" | grep -o '"browser_download_url": *"[^"]*\.exe"' || echo "(aucun trouvé -- voir la réponse brute ci-dessous)"
          echo "----------------------------------------------------------"

          # Paliers de repli, du plus rapide (avx2, CPU 2013+) au plus
          # compatible (baseline, tout CPU 64-bit) -- au cas où le nom
          # exact des fichiers change d'une release à l'autre. S'arrête au
          # premier qui matche.
          asset_url=""
          for pattern in "avx2.*\.exe" "ssse3.*\.exe" "x86-64.*\.exe" "\.exe\"$"; do
            asset_url=$(echo "$api_response" \
              | grep "browser_download_url.*${pattern}" \
              | grep -v "pext" \
              | head -n1 \
              | grep -o 'https://[^"]*\.exe')
            if [ -n "$asset_url" ]; then
              echo "Variante retenue (motif '$pattern') : $asset_url"
              break
            fi
          done

          if [ -z "$asset_url" ]; then
            echo "❌ Impossible de trouver un binaire .exe dans la dernière release Berserk."
            echo "   Réponse brute de l'API (pour diagnostiquer) :"
            echo "$api_response" | head -c 2000
            echo ""
            echo "   Vérifie manuellement : https://github.com/jhonnold/berserk/releases"
            exit 1
          fi

          echo "Téléchargement: $asset_url"
          curl -L -o dist/stockfish.exe "$asset_url"
          echo "✅ Berserk téléchargé ($(du -h dist/stockfish.exe | cut -f1))"

      - name: Préparer le package final
        shell: bash
        run: |
          set -e
          mkdir -p package/CoachEchecs
          cp dist/CoachEchecs.exe package/CoachEchecs/
          cp dist/stockfish.exe package/CoachEchecs/
          cp README_UTILISATEUR.md package/CoachEchecs/LISEZ-MOI.md
          # Livre d'ouvertures : optionnel. S'il est présent à la racine du
          # dépôt (voir opening_book.py), on l'embarque à côté de l'exe --
          # sinon le coach fonctionne quand même, juste sans lui.
          if [ -f opening_book.bin ]; then
            cp opening_book.bin package/CoachEchecs/
            echo "Livre d'ouvertures inclus dans le package."
          else
            echo "Pas de opening_book.bin trouvé à la racine du dépôt -- package sans livre d'ouvertures."
          fi
          cd package
          7z a -r CoachEchecs-windows.zip CoachEchecs

      - name: Publier la Release avec le zip
        uses: softprops/action-gh-release@v2
        with:
          files: package/CoachEchecs-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Garder aussi le zip comme artifact (pour les builds manuels sans tag)
        uses: actions/upload-artifact@v4
        with:
          name: CoachEchecs-windows
          path: package/CoachEchecs-windows.zip
